spring.application.name=godown
# Database Connectivity Parameters
spring.datasource.url=jdbc:mysql://localhost:3306/fabric_factory_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate DDL Auto - Set to 'validate' so Flyway handles schema alterations safely
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Flyway Automation Parameters
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Database Connectivity Configuration
#spring.datasource.url=jdbc:mysql://localhost:3306/fabric_inventory_billing_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=your_secure_password
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP Enterprise Connection Pooling Parameters
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1800000

# Hibernate ORM Architecture Settings
#spring.jpa.hibernate.ddl-auto=update
#spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Execution Engine Configuration
server.port=8080
server.servlet.context-path=/

# Secret key must be a base64 encoded string of at least 256 bits
app.jwt.secret=Zm9ydHktdHdvLWNoYXJhY3Rlci1zZWNyZXQta2V5LWZvci1qd3Qtc2lnbmluZy1iYXNlNjQ=
# 1 Hour expiration (in milliseconds)
app.jwt.expiration=3600000


# 1. Change logging levels (Trace < Debug < Info < Warn < Error)
logging.level.root=INFO
logging.level.org.springframework.security=DEBUG
://level.com.yourcompany.app=TRACE

# 2. Save logs to a physical file (instead of just printing to console)
logging.file.name=logs/application.log

# 3. Configure log rotation rules so log files don't grow forever
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.total-size-cap=1GB

#springdoc.swagger-ui.enabled=true

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
disable.jwt=true

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Godown Registry Scalability Window Horizon Configuration
# (Value represented as integer units tracking rolling calendar years)
# Default operational lookback window for Available and Sold logs tabs
godown.data-horizon.years=5

# ? NEW: Default archival lookback window for the ALL tab when no criteria is provided
godown.data-horizon.archive-years=2

# Godown Invoicing Scalability Window Horizon Configuration
# (Value represented as integer units tracking rolling calendar years)
godown.salesbill-horizon.years=5
godown.salesbill-horizon.archive-years=2


# Pivot year boundary splitting century assignments (e.g., 70 splits 1970 and 2069)
godown.data.year-pivot-threshold=70

# Default fallbacks when short strings or abbreviations are parsed into centuries
godown.data.century-past-fallback=1900
godown.data.century-future-fallback=2000

# API Layer Security Tuning Parameters
godown.api.default-page-size=20
godown.api.min-search-char-length=3

# Financial & Regulatory Defaults Configuration
godown.finance.default-tax-rate=5.00